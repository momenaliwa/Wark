<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>يومية الورشة الشاملة</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 10px; }
        h2, h3 { text-align: center; color: #333; margin-top: 5px; }
        .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .time-row { display: flex; gap: 10px; }
        .time-row div { width: 50%; }
        button { background-color: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #0056b3; }
        button.whatsapp-btn { background-color: #25d366; margin-top: 10px; }
        button.excel-btn { background-color: #17a2b8; margin-top: 10px; }
        button.backup-btn { background-color: #6c757d; margin-top: 10px; }
        button.restore-btn { background-color: #ff9800; margin-top: 10px; color: black; }
        .checkbox-container { display: flex; align-items: center; font-size: 16px; margin-bottom: 10px; font-weight: bold; color: #d32f2f; }
        .checkbox-container input { width: auto; margin-left: 10px; width: 22px; height: 22px; }
        .report-box { background: #e9ecef; padding: 10px; border-radius: 6px; margin-top: 10px; line-height: 1.6; }
        hr { border: 1px solid #ddd; margin: 15px 0; }
        .date-picker { background-color: #e3f2fd; border-color: #90caf9; font-weight: bold; }
        .special-day { border-color: #ff9800; background-color: #fff3e0; }
        .phone-text { font-size: 13px; color: #555; }
        .action-btn { float: left; width: auto; padding: 4px 8px; margin: 0 2px; font-size: 13px; border-radius: 4px; }
        .del-btn { background: #dc3545; }
        .edit-btn { background: #ffc107; color: black; }
    </style>
</head>
<body>

    <h2>🏗️ يومية الورشة</h2>

    <div class="card">
        <h3>📅 اختر اليوم</h3>
        <input type="date" id="currentDate" class="date-picker" onchange="loadDayData()">
        <input type="text" id="dayNote" class="special-day" placeholder="وصف اليوم (مثال: صبة باطون...)" onchange="saveDayNote()">
    </div>

    <div class="card" id="workerSection">
        <h3>👷 إضافة عامل أو سلفة</h3>
        <input type="text" id="workerName" list="workerList" placeholder="اسم العامل" oninput="autofillWorker()">
        <datalist id="workerList"></datalist>
        
        <input type="tel" id="workerPhone" placeholder="رقم الهاتف (اختياري)">
        
        <div class="time-row">
            <div><label>ساعة إجى:</label><input type="time" id="startTime"></div>
            <div><label>ساعة روّح:</label><input type="time" id="endTime"></div>
        </div>
        <div class="checkbox-container">
            <input type="checkbox" id="hafsaka">
            <label>☑️ خصم هفسكا (نصف ساعة)</label>
        </div>
        <input type="number" id="hourlyRate" placeholder="سعر الساعة">
        <input type="number" id="paidAmount" placeholder="المبلغ اللي اندفعله اليوم (أو سلفة)">
        <button onclick="addWorker()">➕ إضافة لليومية</button>
    </div>

    <div class="card" id="materialSection">
        <h3>🧱 مواد ومصاريف اليوم</h3>
        <input type="text" id="materialName" placeholder="اسم المادة (مثال: باطون، رمل، ديزل)">
        <input type="number" id="materialCost" placeholder="التكلفة">
        <button onclick="addMaterial()" style="background-color: #ffc107; color: black;">➕ إضافة مصروف</button>
    </div>

    <div class="card">
        <h3>📊 ملخص اليوم المحدد</h3>
        <div id="dailyReport" class="report-box">
            <i>اختر يوماً لرؤية البيانات...</i>
        </div>
        <button class="whatsapp-btn" onclick="shareWhatsApp()">📲 إرسال تقرير اليوم (واتساب)</button>
    </div>

    <div class="card" style="border: 2px solid #dc3545;">
        <h3 style="color: #dc3545;">📒 دفتر ديون العمال (الحساب الختامي)</h3>
        <button style="background-color: #dc3545;" onclick="showDebts()">👁️ عرض الحساب الشامل لكل العمال</button>
        <div id="debtReport" class="report-box" style="display: none; background-color: #f8d7da;"></div>
    </div>

    <div class="card" style="border: 2px solid #28a745;">
        <h3>💰 جرد فترة والنسخ الاحتياطي</h3>
        <div class="time-row">
            <div><label>من تاريخ:</label><input type="date" id="startDate"></div>
            <div><label>إلى تاريخ:</label><input type="date" id="endDate"></div>
        </div>
        <button style="background-color: #28a745;" onclick="calculatePeriod()">🔍 احسب الفترة</button>
        <div id="periodReport" class="report-box" style="display: none; background-color: #d4edda;"></div>
        
        <hr>
        <h4 style="text-align: center; margin-bottom: 5px;">أمان البيانات 🛡️</h4>
        <button class="excel-btn" onclick="exportToExcel()">📊 تنزيل للقراءة (Excel)</button>
        <button class="backup-btn" onclick="backupDatabase()">💾 أخذ نسخة احتياطية (لنقل التليفون)</button>
        
        <input type="file" id="importFile" style="display:none" onchange="restoreDatabase(event)" accept=".json">
        <button class="restore-btn" onclick="document.getElementById('importFile').click()">📂 استرجاع البيانات من نسخة احتياطية</button>
    </div>

    <script>
        function getTodayString() {
            let today = new Date();
            let dd = String(today.getDate()).padStart(2, '0');
            let mm = String(today.getMonth() + 1).padStart(2, '0');
            let yyyy = today.getFullYear();
            return yyyy + '-' + mm + '-' + dd;
        }

        document.getElementById("currentDate").value = getTodayString();
        
        let allData = JSON.parse(localStorage.getItem('workshopDiary')) || {};
        let savedWorkersProfiles = JSON.parse(localStorage.getItem('savedWorkersProfiles')) || {}; 

        function updateWorkerList() {
            let dataList = document.getElementById("workerList");
            dataList.innerHTML = "";
            for (let name in savedWorkersProfiles) {
                let option = document.createElement("option");
                option.value = name;
                dataList.appendChild(option);
            }
        }

        function autofillWorker() {
            let name = document.getElementById("workerName").value;
            if (savedWorkersProfiles[name]) {
                document.getElementById("hourlyRate").value = savedWorkersProfiles[name].rate || "";
                document.getElementById("workerPhone").value = savedWorkersProfiles[name].phone || "";
            }
        }

        function loadDayData() {
            let date = document.getElementById("currentDate").value;
            if (!allData[date]) {
                allData[date] = { note: "", workers: [], materials: [] }; 
            }
            if (!allData[date].materials) allData[date].materials = [];
            
            document.getElementById("dayNote").value = allData[date].note;
            renderDailyReport();
        }

        function saveDayNote() {
            let date = document.getElementById("currentDate").value;
            allData[date].note = document.getElementById("dayNote").value;
            saveData();
        }

        function calculateHours(start, end, isHafsaka) {
            if(!start || !end) return 0;
            let startDate = new Date(`2000-01-01T${start}`);
            let endDate = new Date(`2000-01-01T${end}`);
            let diff = (endDate - startDate) / (1000 * 60 * 60);
            if(diff < 0) diff += 24; 
            if(isHafsaka) diff -= 0.5; 
            return diff > 0 ? diff.toFixed(2) : 0;
        }

        function getWorkerBalance(name) {
            let totalEarned = 0;
            let totalPaid = 0;
            for(let date in allData) {
                allData[date].workers.forEach(w => {
                    if(w.name === name) {
                        totalEarned += w.total;
                        totalPaid += w.paid;
                    }
                });
            }
            return totalEarned - totalPaid;
        }

        function addWorker() {
            let date = document.getElementById("currentDate").value;
            let name = document.getElementById("workerName").value;
            let phone = document.getElementById("workerPhone").value;
            let start = document.getElementById("startTime").value;
            let end = document.getElementById("endTime").value;
            let hasHafsaka = document.getElementById("hafsaka").checked;
            let rate = parseFloat(document.getElementById("hourlyRate").value) || 0;
            let paid = parseFloat(document.getElementById("paidAmount").value) || 0;

            if(name.trim() === "") { alert("الرجاء إدخال اسم العامل"); return; }

            // التحذير من التكرار
            let isDuplicate = allData[date].workers.some(w => w.name === name);
            if (isDuplicate) {
                if(!confirm(`⚠️ العامل "${name}" مسجل اليوم بالفعل!\n\nهل أنت متأكد أنك تريد إضافته مرة أخرى (كشفت إضافي أو سلفة)؟`)) {
                    return; // التراجع إذا اختار "إلغاء"
                }
            }

            let hours = calculateHours(start, end, hasHafsaka);
            let total = hours * rate;
            let debt = total - paid; 

            allData[date].workers.push({ name, phone, start, end, hasHafsaka, hours, rate, total, paid, debt });
            saveData();

            savedWorkersProfiles[name] = { rate: rate, phone: phone };
            localStorage.setItem('savedWorkersProfiles', JSON.stringify(savedWorkersProfiles));
            updateWorkerList();
            
            clearWorkerInputs();
            renderDailyReport();
        }

        function clearWorkerInputs() {
            document.getElementById("workerName").value = "";
            document.getElementById("workerPhone").value = "";
            document.getElementById("startTime").value = "";
            document.getElementById("endTime").value = "";
            document.getElementById("hafsaka").checked = false;
            document.getElementById("hourlyRate").value = "";
            document.getElementById("paidAmount").value = "";
        }

        function addMaterial() {
            let date = document.getElementById("currentDate").value;
            let name = document.getElementById("materialName").value;
            let cost = parseFloat(document.getElementById("materialCost").value) || 0;

            if(name.trim() === "") { alert("الرجاء إدخال اسم المادة"); return; }

            allData[date].materials.push({ name, cost });
            saveData();

            document.getElementById("materialName").value = "";
            document.getElementById("materialCost").value = "";
            
            renderDailyReport();
        }

        function deleteItem(type, index) {
            let date = document.getElementById("currentDate").value;
            if(confirm("متأكد بدك تحذف هذا العنصر؟")) {
                allData[date][type].splice(index, 1);
                saveData();
                renderDailyReport();
            }
        }

        // ميزة التعديل السريع
        function editItem(type, index) {
            let date = document.getElementById("currentDate").value;
            let item = allData[date][type][index];

            if(type === 'workers') {
                document.getElementById("workerName").value = item.name;
                document.getElementById("workerPhone").value = item.phone || "";
                document.getElementById("startTime").value = item.start || "";
                document.getElementById("endTime").value = item.end || "";
                document.getElementById("hafsaka").checked = item.hasHafsaka;
                document.getElementById("hourlyRate").value = item.rate;
                document.getElementById("paidAmount").value = item.paid;
                
                // التوجيه للقسم
                document.getElementById("workerSection").scrollIntoView({behavior: "smooth"});
            } else {
                document.getElementById("materialName").value = item.name;
                document.getElementById("materialCost").value = item.cost;
                document.getElementById("materialSection").scrollIntoView({behavior: "smooth"});
            }

            // حذف القديم حتى يتم حفظ الجديد
            allData[date][type].splice(index, 1);
            saveData();
            renderDailyReport();
        }

        function renderDailyReport() {
            let date = document.getElementById("currentDate").value;
            let workers = allData[date].workers;
            let materials = allData[date].materials;
            let note = allData[date].note;
            
            let html = note ? `<p style="color:#ff9800; font-weight:bold;">📌 ${note}</p><hr>` : '';
            let dayTotalPaid = 0;
            let dayTotalCost = 0;

            html += `<h4>👷 العمال:</h4>`;
            if (workers.length === 0) html += "<p>فش عمال مسجلين.</p>";
            workers.forEach((w, i) => {
                let phoneDisplay = w.phone ? `<span class="phone-text">📞 ${w.phone}</span>` : '';
                let overallBalance = getWorkerBalance(w.name); 
                
                html += `
                    <div style="background:#fff; padding:8px; border:1px solid #ccc; border-radius:5px; margin-bottom:5px; overflow:hidden;">
                        <button onclick="deleteItem('workers', ${i})" class="action-btn del-btn">حذف</button>
                        <button onclick="editItem('workers', ${i})" class="action-btn edit-btn">تعديل ✏️</button>
                        <b style="float:right;">${i+1}. ${w.name}</b> <span style="float:right; margin-right:5px;">${phoneDisplay}</span>
                        <div style="clear:both; margin-top:5px;">
                            <small>دوام: ${w.start || 'بدون'} لـ ${w.end || 'بدون'} ${w.hasHafsaka ? '<b>(مخصوم هفسكا)</b>' : ''}</small>
                            <br>اشتغل <b>${w.hours}</b> ساعات × ${w.rate}/ساعة
                            <br>يومية اليوم: ${w.total} | اندفعله اليوم: <span style="color:green">${w.paid}</span>
                            <hr style="margin:5px 0;">
                            <b>الرصيد الكلي: <span style="color:${overallBalance > 0 ? 'red' : (overallBalance < 0 ? 'blue' : 'green')}">${overallBalance}</span></b>
                        </div>
                    </div>`;
                dayTotalPaid += w.paid;
                dayTotalCost += w.total;
            });

            html += `<hr><h4>🧱 المواد والمصاريف:</h4>`;
            let matTotalCost = 0;
            if (materials.length === 0) html += "<p>فش مصاريف مسجلة.</p>";
            materials.forEach((m, i) => {
                html += `
                    <div style="background:#fff; padding:8px; border:1px solid #ccc; border-radius:5px; margin-bottom:5px; overflow:hidden;">
                        <button onclick="deleteItem('materials', ${i})" class="action-btn del-btn">حذف</button>
                        <button onclick="editItem('materials', ${i})" class="action-btn edit-btn">تعديل ✏️</button>
                        <b style="float:right;">${i+1}. ${m.name}</b>
                        <div style="clear:both; margin-top:5px;">التكلفة: ${m.cost}</div>
                    </div>`;
                matTotalCost += m.cost;
            });

            html += `<hr>
                     <h4>💵 الدفعات النقدية اليوم: ${dayTotalPaid}</h4>
                     <h4>💰 إجمالي التكلفة اليوم (عمال + مواد): ${dayTotalCost + matTotalCost}</h4>`;
            document.getElementById("dailyReport").innerHTML = html;
        }

        function showDebts() {
            let balances = {};
            for(let date in allData) {
                allData[date].workers.forEach(w => {
                    if(!balances[w.name]) { balances[w.name] = { total:0, paid:0 }; }
                    balances[w.name].total += w.total;
                    balances[w.name].paid += w.paid;
                });
            }
            let html = "<h4>تفصيل حسابات العمال من أول يوم لليوم:</h4>";
            let hasData = false;
            for(let name in balances) {
                hasData = true;
                let debt = balances[name].total - balances[name].paid;
                let color = debt > 0 ? 'red' : (debt < 0 ? 'blue' : 'green');
                let debtText = debt > 0 ? `إله ديون: ${debt}` : (debt < 0 ? `ماخذ زيادة/سلفة: ${Math.abs(debt)}` : `حسابه مصفر`);
                
                html += `
                    <div style="background:#fff; padding:8px; border:1px solid #f5c6cb; border-radius:5px; margin-bottom:5px;">
                        <b style="font-size:18px;">${name}</b>
                        <br>إجمالي شغله: ${balances[name].total} | إجمالي استلامه: ${balances[name].paid}
                        <br><b style="color:${color}">${debtText}</b>
                    </div>`;
            }
            if(!hasData) html += "<p>لا يوجد عمال مسجلين بعد.</p>";
            let box = document.getElementById("debtReport");
            box.style.display = "block";
            box.innerHTML = html;
        }

        function shareWhatsApp() {
            let date = document.getElementById("currentDate").value;
            let data = allData[date];
            if (data.workers.length === 0 && data.materials.length === 0) { alert("لا توجد بيانات!"); return; }

            let text = `📊 *تقرير يومية الورشة* - ${date}%0A`;
            if(data.note) text += `📌 *ملاحظة:* ${data.note}%0A%0A`;
            
            text += "👷 *العمال:*%0A";
            data.workers.forEach(w => { 
                let overall = getWorkerBalance(w.name);
                text += `- ${w.name}: ${w.hours} ساعات | الدفعة: ${w.paid} | رصيده الكلي المتبقي: ${overall}%0A`; 
            });

            text += "%0A🧱 *المواد:*%0A";
            data.materials.forEach(m => { text += `- ${m.name}: ${m.cost}%0A`; });

            window.open(`https://wa.me/?text=${text}`, '_blank');
        }

        function calculatePeriod() {
            let start = document.getElementById("startDate").value;
            let end = document.getElementById("endDate").value;
            if(!start || !end) { alert("حدد تاريخ البداية والنهاية!"); return; }

            let totalWorkersPaid = 0; let totalWorkersCost = 0; let totalMatCost = 0;
            let specialDaysHTML = "<ul>";

            for (let date in allData) {
                if (date >= start && date <= end) {
                    let dayNote = allData[date].note;
                    if(dayNote) specialDaysHTML += `<li>${date}: <b>${dayNote}</b></li>`;
                    allData[date].workers.forEach(w => { totalWorkersPaid += w.paid; totalWorkersCost += w.total; });
                    if(allData[date].materials) { allData[date].materials.forEach(m => { totalMatCost += m.cost; }); }
                }
            }
            specialDaysHTML += "</ul>";

            let resHTML = `
                <h4>📈 تقرير الجرد للفترة المحددة:</h4>
                <p>💸 مجموع النقد اللي اندفع للعمال: <b>${totalWorkersPaid}</b></p>
                <p>🧱 مجموع مصاريف المواد: <b>${totalMatCost}</b></p>
                <p>🚨 الديون اللي تولدت بهالفترة للعمال: <b style="color:red">${totalWorkersCost - totalWorkersPaid}</b></p>
                <hr>
                <h4 style="color:blue;">💰 التكلفة الكلية للورشة (مواد + أجور): ${totalWorkersCost + totalMatCost}</h4>
            `;
            if(specialDaysHTML !== "<ul></ul>") { resHTML += `<hr><h5>🗓️ أيام مميزة:</h5>${specialDaysHTML}`; }

            let box = document.getElementById("periodReport");
            box.style.display = "block";
            box.innerHTML = resHTML;
        }

        function exportToExcel() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "التاريخ,النوع,الاسم/الوصف,رقم الهاتف,ساعات العمل,التكلفة اليومية,المدفوع اليوم,ديون اليوم فقط\n";
            
            for (let date in allData) {
                let d = allData[date];
                if(d.note) csvContent += `${date},ملاحظة يوم,${d.note},,,,,\n`;
                d.workers.forEach(w => {
                    let phoneStr = w.phone || "";
                    csvContent += `${date},عامل,${w.name},${phoneStr},${w.hours},${w.total},${w.paid},${w.debt}\n`;
                });
                if(d.materials) {
                    d.materials.forEach(m => {
                        csvContent += `${date},مادة/مصروف,${m.name},,,${m.cost},,\n`;
                    });
                }
            }
            
            let encodedUri = encodeURI(csvContent);
            let link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "workshop_excel_report.csv");
            document.body.appendChild(link);
            link.click();
        }

        // --- دوال النسخ الاحتياطي (جديدة) ---
        function
